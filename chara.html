<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>生徒名簿 | とりの丘学園</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="chara-page">
    <header class="mini-header">
        <nav class="premium-nav">
            <a href="index.html" class="nav-item">HOME</a>
            <a href="chara.html" class="nav-item active">生徒名簿</a>
            <a href="life.html" class="nav-item">学校生活</a> <!-- ★追加！ -->
            <a href="story.html" class="nav-item">ストーリー</a>
            <a href="bulletin.html" class="nav-item">掲示板</a>
            <a href="letters.html" class="nav-item">お手紙</a>
            <a href="games.html" class="nav-item">コンテンツ</a>
        </nav>
    </header>

    <main class="container">
    <section class="luxury-section">
        <h2 class="gold-title"><i class="fas fa-users"></i> 生徒を探す</h2>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="char-search-input" onkeyup="searchCharacters()" placeholder="名前・フルネーム・クラスで検索..." class="search-input">
        </div>
        <!-- プルダウンは既存のものを維持 -->
        <div class="filter-dropdown-area">
            <select id="char-class-filter" class="premium-select" onchange="renderCharactersByClass(this.value)">
                <option value="all">全校生徒を表示</option>
            </select>
        </div>
        
        <div id="char-grid" class="char-grid"></div>
    </section>
    </main>

    <!-- プロフモーダル -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeProfile()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
