<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GNTX973GET"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GNTX973GET');
    </script>
    <title>生徒名簿 | とりの丘学園</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="chara-page">
    <header class="main-header"> <!-- mini-header のページも同じようにしてね -->
        <!-- ハンバーガーのアイコンを必ず入れる！ -->
        <div class="menu-toggle" onclick="toggleMenu()" style="position: absolute; top: 20px; right: 20px; font-size: 2rem; color: var(--navy); cursor: pointer; z-index: 10000;">
            <i class="fas fa-bars"></i>
        </div>
        <div class="logo-area" style="text-align: center;">
            <a href="index.html">
                <img src="images/logo.png?v=1" alt="とりの丘学園" style="max-width: 250px; cursor: pointer;" onclick="secretClick()">
            </a>
            <p class="sub-title">Torinooka Academy Portal</p>
        </div>
        <nav class="premium-nav" id="global-nav">
            <a href="index.html" class="nav-item">HOME</a>
            <a href="chara.html" class="nav-item active">生徒名簿</a>
            <a href="life.html" class="nav-item">学校生活</a> <!-- ★追加！ -->
            <a href="story.html" class="nav-item">ストーリー</a>
            <a href="bulletin.html" class="nav-item">掲示板</a>
            <a href="letters.html" class="nav-item">お手紙</a>
            <a href="games.html" class="nav-item">コンテンツ</a>
        </nav>
    </header>

    <main class="container">
    <!-- 生徒を探すセクションの中身 -->
    <section class="luxury-section">
        <h2 class="gold-title"><i class="fas fa-users"></i> 生徒を探す</h2>
        
        <!-- 名前検索 -->
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="char-search-input" onkeyup="searchCharacters()" placeholder="名前・フルネーム・クラスで検索..." class="search-input">
        </div>
        
        <!-- ★ここがプルダウンの受け皿！ id="char-class-filter" が超重要！ -->
        <div class="filter-dropdown-area" style="margin-bottom: 30px; text-align: center;">
            <!-- ★ onchange の中身をシンプルに！ -->
            <select id="char-class-filter" class="premium-select" onchange="renderCharactersByClass(this.value)">
                <option value="all">全校生徒を表示</option>
            </select>
        </div>
        
        <!-- ここに生徒が並ぶ -->
        <div id="char-grid" class="char-grid"></div>
    </section>
    </main>

    <!-- プロフモーダル -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeProfile()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
