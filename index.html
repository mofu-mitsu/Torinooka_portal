<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>とりの丘学園 | 総合ポータル</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">
    <header class="main-header">
        <div class="header-overlay">
            <div class="logo-area">
                <h1><i class="fas fa-feather-alt"></i> とりの丘学園</h1>
                <p class="sub-title">Torinooka Academy Portal</p>
            </div>
            <nav class="premium-nav">
                <a href="index.html" class="nav-item active"><i class="fas fa-home"></i> HOME</a>
                <a href="chara.html" class="nav-item"><i class="fas fa-users"></i> 生徒名簿</a>
                <a href="#" class="nav-item"><i class="fas fa-book"></i> ストーリー</a>
                <a href="#" class="nav-item"><i class="fas fa-gamepad"></i> コンテンツ</a>
            </nav>
        </div>
    </header>

    <!-- ... (ヘッダーなどは共通) ... -->
    <main class="container">
        <!-- 学園理念（制服と分離） -->
        <section class="luxury-section">
            <h2 class="gold-title"><i class="fas fa-university"></i> 学園理念</h2>
            <div class="philosophy-box">
                <p class="main-philo" id="school-philosophy"></p>
                <p class="concept-text" id="school-concept"></p>
            </div>
        </section>
        <!-- 制服紹介（専用の説明文を追加） -->
        <section class="luxury-section">
            <h2 class="gold-title"><i class="fas fa-tshirt"></i> 制服コレクション</h2>
            <p id="uniform-policy" class="policy-text"></p>
            <div class="uniform-grid" id="uniform-display"></div>
        </section>
        <!-- 今日のとり -->
        <section id="today-pickup" class="luxury-section">
            <h2 class="gold-title"><i class="fas fa-star"></i> 今日のとり</h2>
            <div id="random-char-display" class="pickup-content">
                <!-- script.jsから入るよ -->
            </div>
        </section>

        <!-- 人気投票セクション -->
        <section id="vote-section" class="luxury-section">
            <h2 class="gold-title"><i class="fas fa-crown"></i> 月間人気投票</h2>
            <p style="text-align:center;">お気に入りの生徒にエールを送りましょう！</p>
            <div id="quick-vote-area" class="vote-grid">
                <!-- JSで上位キャラを表示 -->
            </div>
        </section>
        <div id="ranking-board" style="margin-top: 30px;">
            <h3><i class="fas fa-trophy"></i> 今月の人気ランキング</h3>
            <div id="ranking-display" class="ranking-container">
                <!-- GASから読み込まれます -->
            </div>
        </div>
    <section id="letter-section" class="luxury-section">
        <h2 class="gold-title"><i class="fas fa-envelope-open-text"></i> 生徒へのお手紙</h2>
        
        <!-- お手紙フォーム -->
        <div class="letter-form">
            <select id="letter-class-select" onchange="updateLetterCharSelect()">
                <option value="">クラスを選択</option>
            </select>
            <select id="letter-to">
                <option value="">先にクラスを選んでね</option>
            </select>
            <textarea id="letter-content" placeholder="メッセージをどうぞ..."></textarea>
            <button onclick="sendLetter()" class="premium-btn">手紙を送る</button>
        </div>

        <!-- お返事掲示板 -->
        <div id="reply-board">
            <h3 class="gold-title" style="margin-top: 40px;"><i class="fas fa-comment-dots"></i> 学園からの返信</h3>
            <div id="reply-display" class="reply-container">
                <!-- ここにお返事が出ます -->
            </div>
        </div>
    </section>

    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
