<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>とりの丘学園 | 総合ポータル</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-page">
    <header class="main-header">
        <div class="header-overlay">
            <div class="logo-area">
                <h1><i class="fas fa-feather-alt"></i> とりの丘学園</h1>
                <p class="sub-title">Torinooka Academy Portal</p>
            </div>
            <nav class="premium-nav">
                <a href="index.html" class="nav-item">HOME</a>
                <a href="chara.html" class="nav-item">生徒名簿</a>
                <a href="story.html" class="nav-item">ストーリー</a> <!-- # から story.html に変更 -->
                <a href="world.html" class="nav-item">世界観・相関図</a>
                <a href="#" class="nav-item">コンテンツ</a>
            </nav>
        </div>
    </header>
    <div id="soup-overlay" class="soup-overlay">
        <h1 style="color: #8b4513;">🍜 豚骨スープの海 🍜</h1>
        <p>「拙者のエキスだゾッ♡」</p>
        <!-- ここにスープをぶっかけられたような画像を表示 -->
    </div>
    <!-- ... (ヘッダーなどは共通) ... -->
    <main class="container">
        <!-- 学園理念（制服と分離） -->
        <section class="luxury-section">
            <h2 class="gold-title"><i class="fas fa-university"></i> 学園理念</h2>
            <div class="philosophy-box">
                <p class="main-philo" id="school-philosophy"></p>
                <p class="concept-text" id="school-concept"></p>
            </div>
        </section>
        <!-- 制服紹介（専用の説明文を追加） -->
        <section class="luxury-section">
            <h2 class="gold-title"><i class="fas fa-tshirt"></i> 制服コレクション</h2>
            <p id="uniform-policy" class="policy-text"></p>
            <div class="uniform-grid" id="uniform-display"></div>
        </section>
        <!-- 今日のとり -->
        <section id="today-pickup" class="luxury-section">
            <h2 class="gold-title"><i class="fas fa-star"></i> 今日のとり</h2>
            <div id="random-char-display" class="pickup-content">
                <!-- script.jsから入るよ -->
            </div>
        </section>
            <section class="luxury-section">
                <div class="three-column">
                    <!-- 学食 -->
                    <div class="menu-section">
                        <h2 class="gold-title"><i class="fas fa-utensils"></i> 本日の学食</h2>
                        <div id="today-menu-display"></div>
                    </div>
                    <!-- 掲示板 -->
                    <div class="bulletin-section">
                        <h2 class="gold-title"><i class="fas fa-clipboard"></i> 掲示板</h2>
                        <div style="text-align:center; padding:20px;">
                            <p>生徒たちの日常をのぞいてみよう</p>
                            <a href="bulletin.html" class="premium-btn" style="text-decoration:none; display:inline-block;">掲示板を見に行く</a>
                        </div>
                    </div>
                    <!-- カレンダー -->
                    <div class="calendar-section">
                        <h2 class="gold-title"><i class="fas fa-calendar-alt"></i> カレンダー</h2>
                        <div id="calendar-display"></div>
                    </div>
                </div>
            </section>
        <!-- 人気投票セクション -->
        <section id="vote-section" class="luxury-section">
            <h2 class="gold-title"><i class="fas fa-crown"></i> 月間人気投票</h2>
            <p style="text-align:center;">お気に入りの生徒にエールを送りましょう！</p>
            <div id="quick-vote-area" class="vote-grid">
                <!-- JSで上位キャラを表示 -->
            </div>
        </section>
        <div id="ranking-board" style="margin-top: 30px;">
            <h3><i class="fas fa-trophy"></i> 今月の人気ランキング</h3>
            <div id="ranking-display" class="ranking-container">
                <!-- GASから読み込まれます -->
            </div>
        </div>
    <section id="letter-section" class="luxury-section">
        <h2 class="gold-title"><i class="fas fa-envelope-open-text"></i> 生徒へのお手紙</h2>
        
        <!-- お手紙フォーム -->
        <div class="letter-form">
            <select id="letter-class-select" onchange="updateLetterCharSelect()">
                <option value="">クラスを選択</option>
            </select>
            <select id="letter-to">
                <option value="">先にクラスを選んでね</option>
            </select>
            <textarea id="letter-content" placeholder="メッセージをどうぞ..."></textarea>
            <button onclick="sendLetter()" class="premium-btn">手紙を送る</button>
        </div>

        <!-- お返事掲示板 -->
        <div id="reply-board">
            <h3 class="gold-title" style="margin-top: 40px;"><i class="fas fa-comment-dots"></i> 学園からの返信</h3>
            <div id="reply-display" class="reply-container">
                <!-- ここにお返事が出ます -->
            </div>
        </div>
    </section>
    <div id="secret-modal" class="modal">
        <div class="modal-content" style="background: #ffffd0; border: 10px solid #8b4513;">
            <span class="close-btn" onclick="closeSecret()">&times;</span>
            <div id="secret-body" style="text-align: center;">
                <h1 style="color: #d35400;">💪 汗と脂のファンタジー 💪</h1>
                <p>「よく来たな。プロテインと豚骨スープ、どっちがいいゾ？」</p>
                <div style="display: flex; justify-content: space-around; margin: 20px;">
                    <img src="images/gohobi.png" style="width: 150px;" onerror="this.src='https://via.placeholder.com/150?text=Pig'">
                    <img src="images/eiji.png" style="width: 150px;" onerror="this.src='https://via.placeholder.com/150?text=Eiji'">
                </div>
                <button onclick="drinkFantasy()" class="premium-btn" style="background: #e67e22;">秘伝のスープを飲み干す</button>
            </div>
        </div>
    </div>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
