<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>学園史記録 | とりの丘学園</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="story-page">
    <header class="mini-header">
        <nav class="premium-nav">
            <a href="index.html" class="nav-item">HOME</a>
            <a href="chara.html" class="nav-item">生徒名簿</a>
            <a href="story.html" class="nav-item active">ストーリー</a>
            <a href="games.html" class="nav-item">コンテンツ</a>
        </nav>
    </header>

    <main class="container">
        <!-- 執筆ボタン -->
        <div style="text-align: right; margin-bottom: 20px;">
            <button onclick="toggleStoryForm()" class="premium-btn"><i class="fas fa-pen-nib"></i> 新しく物語を刻む</button>
        </div>

        <!-- 投稿フォーム -->
        <section id="story-form-area" class="luxury-section" style="display: none;">
            <h2 class="gold-title">学園史を投稿</h2>
            <div class="letter-form">
                <input type="text" id="story-title" placeholder="タイトル">
                <select id="story-stage" class="premium-select">
                    <option value="共通">共通</option>
                    <option value="H1-1">H1-1</option><option value="H1-2">H1-2</option>
                    <option value="H1-3">H1-3</option><option value="H1-4">H1-4</option>
                    <option value="H2-1">H2-1</option><option value="H2-2">H2-2</option>
                    <option value="H3-1">H3-1</option><option value="H3-2">H3-2</option>
                </select>
                <input type="text" id="story-chars" placeholder="登場キャラ（例：のりおみ、くう）※「、」で区切る">
                <input type="text" id="story-tag" placeholder="タグ（例：日常、過去、事件）">
                <textarea id="story-content" placeholder="物語の内容..."></textarea>
                <button onclick="sendStory()" class="premium-btn">投稿する</button>
            </div>
        </section>

        <!-- 検索パネル（ここがJSと連動するゾッ） -->
        <section class="luxury-section">
            <h2 class="gold-title"><i class="fas fa-search"></i> 物語を探す</h2>
            <div class="story-search-grid">
                <input type="text" id="search-text" placeholder="キーワード・キャラ名で検索" onkeyup="executeStorySearch()" class="premium-select" style="border-radius:30px; margin-bottom:10px;">
                <div style="display:flex; gap:10px;">
                    <select id="filter-tag" class="premium-select" onchange="executeStorySearch()">
                        <option value="all">すべてのタグ</option>
                    </select>
                    <select id="filter-class" class="premium-select" onchange="executeStorySearch()">
                        <option value="all">すべてのクラス</option>
                    </select>
                </div>
            </div>
            
            <div id="story-list" class="story-grid">
                <!-- ここに物語が並びます（ローディング表示あり） -->
            </div>
        </section>
    </main>

    <!-- ★全文表示用モーダル（これが必要だったんだゾッ！） -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeProfile()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
